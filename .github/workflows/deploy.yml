# Builds the static site and publishes public/ to GitHub Pages on every push to main.
# In your repo: Settings → Pages → Build and deployment → Source: "GitHub Actions".
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      # No Node setup step needed: ubuntu-latest ships with Node, and the build
      # has zero dependencies (cheerio is only used by the local scraper). This
      # also avoids pinning an old Node version and speeds the deploy up.
      - run: node scripts/build.js
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - id: deployment
        uses: actions/deploy-pages@v4
